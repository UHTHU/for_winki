<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Winki 💙</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #f5fafd 0%, #dceefb 50%, #c5dff0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c3d4d;
      overflow: hidden;
    }

    main {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }

    h1 {
      font-size: 1.5rem;
      color: #5b9bd5;
      margin-bottom: 2rem;
      font-weight: 600;
    }

    .question {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2.5rem;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      min-height: 60px;
    }

    button {
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    button:active {
      transform: scale(0.96);
    }

    #yes {
      background: #5b9bd5;
      color: white;
      box-shadow: 0 4px 14px rgba(91, 155, 213, 0.4);
    }

    #yes:hover {
      background: #4a8ac4;
    }

    #no {
      background: white;
      color: #5b9bd5;
      border: 2px solid #9ec9e8;
      position: relative;
      transition: left 0.15s, top 0.15s;
    }

    .hidden {
      display: none !important;
    }

    #success {
      animation: pop 0.4s ease-out;
    }

    #success p {
      font-size: 1.5rem;
      font-weight: 600;
      color: #5b9bd5;
      margin-bottom: 0.5rem;
    }

    #success span {
      font-size: 3rem;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <main>
    <div id="ask">
      <h1>Hey Winki 💙</h1>
      <p class="question">Will you be my girlfriend?</p>
      <div class="buttons">
        <button id="yes">Yes</button>
        <button id="no">No</button>
      </div>
    </div>

    <div id="success" class="hidden">
      <span>💙</span>
      <p>Yay! Best day ever!</p>
    </div>
  </main>

  <script>
    const noBtn = document.getElementById('no');
    const yesBtn = document.getElementById('yes');
    const ask = document.getElementById('ask');
    const success = document.getElementById('success');

    function moveNo() {
      const padding = 16;
      const maxX = window.innerWidth - noBtn.offsetWidth - padding;
      const maxY = window.innerHeight - noBtn.offsetHeight - padding;

      noBtn.style.position = 'fixed';
      noBtn.style.left = Math.max(padding, Math.random() * maxX) + 'px';
      noBtn.style.top = Math.max(padding, Math.random() * maxY) + 'px';
    }

    noBtn.addEventListener('mouseenter', moveNo);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveNo();
    });

    yesBtn.addEventListener('click', () => {
      ask.classList.add('hidden');
      success.classList.remove('hidden');
    });
  </script>
</body>
</html>
